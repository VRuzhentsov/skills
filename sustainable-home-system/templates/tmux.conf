# Durable terminal sessions — per-tab auto-attach model.
# Each Konsole tab runs ~/.local/bin/tmux-auto-attach which creates or
# reattaches to a tmux session named after the working directory.

set -g default-terminal "tmux-256color"
set -g history-limit 200000
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Keep tmux state in XDG state, not in the home directory root.
set -g @resurrect-dir '~/.local/state/tmux/resurrect'

# Restore layout, panes, working directories, processes, and scrollback.
# Add long-running CLI tools you want auto-restarted after reboot here.
set -g @resurrect-processes 'vi vim nvim emacs man less more tail top htop btop ssh bash zsh fish "opencode->opencode --continue"'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'full'

# Autosave tmux sessions every 5 minutes.
set -g @continuum-save-interval '5'
set -g @continuum-restore 'off'
set -g @continuum-boot 'off'

# tmux plugin manager.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
